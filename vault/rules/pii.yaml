# PII / sensitive-data gate for oh-my-boring.
#
# This is a SHAPE-BASED scanner. No domain/value allowlists — they drift and silently leak.
# Company-specific values (real names, internal hosts, company IPs) go into pii.local.yaml,
# which is gitignored and merged over this file at runtime.
#
# Actions:
#   block  — reject the note (credentials, RRN, salary values, etc.)
#   redact — auto-substitute `replacement` and persist
#   flag   — persist, but tag the note `pii-flag` for review
#   allow  — non-PII carve-out skipped by block/redact/flag
#
# Replacement strings may use capture-group references like $1.
# Exemption marker (line-based, ignored by block rules):
#   <!-- pii-allow: <reason> -->

version: "1.0"

policy:
  default_action: flag
  exemption_marker: "<!-- pii-allow:"

rules:
  # ── Identity numbers (Korean) ──────────────────────────────────────────────────
  - name: rrn_hyphenated
    regex: '\b\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])-[1-4]\d{6}\b'
    action: block
    severity: critical
    reason: 주민등록번호 (하이픈 동반)

  - name: rrn_unhyphenated
    regex: '\b\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])[1-4]\d{6}\b'
    action: block
    severity: critical
    reason: 주민등록번호 13자리

  # ── Contact PII ─────────────────────────────────────────────────────────────────
  - name: phone_kr_mobile
    regex: '\b01[0-9][-\s]?\d{3,4}[-\s]?\d{4}\b'
    action: redact
    replacement: "[PHONE]"
    severity: warning
    reason: 한국 휴대폰 번호

  - name: email
    regex: '(?i)\b(?!git@)[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}\b'
    action: redact
    replacement: "[EMAIL]"
    severity: warning
    reason: 이메일 형태

  - name: git_ssh_user
    regex: '\bgit@[a-z0-9.-]+\.[a-z]{2,}\b'
    action: allow
    severity: info
    reason: git clone SSH 유저 (이메일 아님)

  # ── Network ─────────────────────────────────────────────────────────────────────
  - name: ipv4_any
    regex: '\b(?:(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)\.){3}(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)\b'
    action: redact
    replacement: "[IP]"
    severity: warning
    reason: IPv4 주소

  # ── Personnel / HR ───────────────────────────────────────────────────────────────
  - name: salary_value
    regex: '(?i)(연봉|급여|월급|성과급|stock\s*option|스톡옵션)\s*[:=]?\s*[\d,]+'
    action: block
    severity: critical
    reason: 급여·보상 정보

  - name: hr_evaluation
    regex: '(?i)(인사평가|고과|평가\s*등급|징계|경위서|시말서)'
    action: flag
    severity: warning
    reason: 인사평가·징계 언급

  # Context-anchored Korean names. We do NOT hold a name list (that itself is PII).
  # Matches a public surname char class + 1-2 hangul chars anchored by a label or title.
  - name: name_after_author_label
    regex: '((?:작성자|보고자|기안자|인계자|인수자|담당자|담당)\s*[:：]\s*)(?!(?:남자|여자|배경|서비스|지라|프로젝트|시스템|고객|회원|전체|팀)(?![가-힣]))[김이박최정강조윤장임한오서신권황안송류전홍고문손양배백허유남심노하곽성차주우구민지엄채원천방공현함변염여추도소석선설마길연위표명기반왕금옥육인맹제모탁국어은편용예봉][가-힣]{1,2}(?![가-힣])'
    action: redact
    replacement: "$1[NAME]"
    severity: warning
    reason: 라벨 뒤 실명 (이름 미보유, 라벨 보존)

  - name: name_before_title
    regex: '(?<![가-힣])(?!(?:남자|여자|배경|서비스|지라|프로젝트|시스템|고객|회원|전체|대리)(?![가-힣]))[김이박최정강조윤장임한오서신권황안송류전홍고문손양배백허유남심노하곽성차주우구민지엄채원천방공현함변염여추도소석선설마길연위표명기반왕금옥육인맹제모탁국어은편용예봉][가-힣]{1,2}(\s*(?:대표님|대표|부장|차장|과장|팀장|이사|상무|전무|부사장|사장|수석|책임|매니저|선임|주임|대리|님)(?![가-힣]))'
    action: redact
    replacement: "[NAME]$1"
    severity: warning
    reason: 이름+직함 (직함 보존)

  # ── Business confidential ────────────────────────────────────────────────────────
  - name: financial_figure
    regex: '(?i)(매출|영업이익|순이익|거래액|GMV|MRR|ARR)\s*[:=]?\s*[\d,.]+\s*(억|만|원|won|krw|\$)'
    action: flag
    severity: warning
    reason: 미공개 재무 수치

  - name: confidentiality_marker
    regex: '(?i)(\bNDA\b|기밀유지|대외비|confidential|남부\s*한정|\binsider\b)'
    action: flag
    severity: warning
    reason: 기밀 표기 문서

  # ── Issue references ─────────────────────────────────────────────────────────────
  - name: ticket_id
    regex: '\b[A-Z]{2,5}-\d+\b'
    action: flag
    severity: warning
    reason: Jira/이슈 트래커 티켓 ID
