# Schema — the page ID / sources / frontmatter schema for the oh-my-boring personal vault
#
# This file = the SSOT for machine parsing by bots/tools (read by drudge `vault lint`/`vault audit`).
# The human-facing natural-language description is .rules/frontmatter.md. The two files must stay consistent.

page_id:
  # Page ID regex. Both the wiki/<id>.md filename and the frontmatter id must satisfy it.
  pattern: "^wiki-\\d{4,5}$"

sources:
  # Allowed prefixes for paths in the sources field.
  # raw/   = immutable evidence snapshots (distill notes, session narratives, etc.).
  # meta/  = meta information (when citing integrations/contracts).
  # .rules/ = when a governance page cites the guard itself as a source (meta-page exception).
  allowed_prefixes:
    - "raw/"
    - "meta/"
    - ".rules/"

required_frontmatter:
  # Required fields in the page frontmatter. The keys themselves must exist.
  - id
  - title
  - kind
  - origin
  - date

# Allowed values for kind / origin (parse-don't-validate: parse once at the boundary)
kind:
  allowed_values:
    - note
    - memory
    - session
    - decision

origin:
  allowed_values:
    - personal
    - company
