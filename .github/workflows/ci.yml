name: ci

# PR + main push 게이트. 로컬 scripts/guard.sh 와 동일 게이트를 그대로 호출(SSOT) +
# gitleaks 시크릿 스캔. 둘 다 통과해야 main 머지(브랜치 보호의 required check).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: drudge
      # scripts/guard.sh = rustfmt --check + clippy -D warnings + test (스택-프리).
      - name: structural gate (guard.sh)
        run: ./scripts/guard.sh

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리 스캔(과거 커밋 누수도 잡음)
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # supply-chain gate — dependency vulns (RUSTSEC), licenses, duplicate versions. drudge/deny.toml is the policy.
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: drudge/Cargo.toml
          arguments: --all-features

  # broad security scan — filesystem vulns + IaC/Dockerfile misconfig + secrets.
  # Complements gitleaks (secrets) and cargo-deny (Rust deps) with OS/IaC coverage.
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0, SHA-pinned (was @master — unpinned = non-repro/supply-chain risk)
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml # redactor-test fake tokens (parallels gitleaks allowlist)
          exit-code: "1" # fail the job on CRITICAL/HIGH findings

  # Validate compose file syntax without pulling models / starting the stack.
  # Catches docker-compose.yml drift (e.g. service name changes that break Makefile COMPOSE fallback).
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate docker-compose config
        run: docker compose config >/dev/null || docker-compose config >/dev/null

  # Ensure the Rust engine image still builds from a clean checkout.
  # Catches Dockerfile / Cargo drift that guard.sh (stack-free) cannot detect.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: build drudge image
        run: make build

  # Behavioral RAG gate — recall@k regression on the golden set (data/eval/golden.json).
  # Embeddings are replayed OFFLINE from recorded real bge-m3 vectors (data/eval/stub_embedder.py),
  # so no GPU/model pull is needed and CI recall == real recall. The stack runs in vector mode via
  # docker compose; the stub serves on the runner host, reached from the container at
  # host.docker.internal (the engine's configured base_url). This is the eval-gate.sh path that was
  # previously manual-only (`make eval`).
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: start offline stub embedder (recorded bge-m3 replay)
        run: |
          python3 data/eval/stub_embedder.py &
          for _ in $(seq 1 20); do curl -sf http://localhost:11434/v1/models >/dev/null && break; sleep 0.5; done
          curl -sf http://localhost:11434/v1/models
      - name: prepare config + mounts
        run: |
          # boring.example.json already points llm.base_url at host.docker.internal:11434/v1 (the stub),
          # embed_dim=1024 matches the recording. provider/bootstrap are host-side only (unused here).
          cp boring.example.json boring.json
          mkdir -p vault/raw vault/wiki "$HOME/.claude/projects"
      - name: start stack (vector mode)
        env:
          DRUDGE_VECTOR: "on"
        run: |
          # Run the container as the runner user so it can write the bind-mounted vault (Linux EACCES guard).
          export DRUDGE_UID="$(id -u)" DRUDGE_GID="$(id -g)"
          docker compose --profile vector up -d --build boring-drudge postgres
          for _ in $(seq 1 60); do curl -sf -m3 http://127.0.0.1:7700/health >/dev/null 2>&1 && break; sleep 3; done
          curl -sf -m3 http://127.0.0.1:7700/health
      - name: behavioral gate (eval-gate.sh)
        env:
          DRUDGE_URL: http://127.0.0.1:7700
        run: ./scripts/eval-gate.sh
      - name: engine logs on failure
        if: failure()
        run: docker compose --profile vector logs boring-drudge postgres
