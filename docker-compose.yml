# oh-my-boring — live stack (local Docker). host Ollama + drudge + hermes-agent (+ Postgres via --profile vector).
#   make up              # wiki-first: drudge + hermes-agent
#   DRUDGE_VECTOR=on …   # also brings up Postgres (pgvector) via --profile vector
#   Slack, autonomy, and recall are driven by hermes-agent (Nous Hermes Agent). Models run on host Ollama (gemma4).
name: oh-my-boring

services:
  # ─────────────────────────── Postgres + pgvector (graph = node/edge + CTE) ─────
  # Vector (HNSW) + FTS + graph (node/edge tables, recursive CTE). Pure pgvector, no AGE.
  # Opt-in: wiki-first is the default, so pgvector comes up only with `--profile vector` (to try graph+vector).
  postgres:
    profiles: ["vector"]
    image: pgvector/pgvector:pg16
    container_name: boring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: boring
      POSTGRES_PASSWORD: boring
      POSTGRES_DB: boring
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data   # persistent (survives container teardown)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boring -d boring"]
      interval: 3s
      timeout: 3s
      retries: 30
    ports:
      - "127.0.0.1:5432:5432"             # for DataGrip / direct connection

  # ─────────────────────────── drudge (Rust engine) ─────────────────────────
  # Performs ingest, recall (ask/graph), audit, and vault compile over HTTP + cron.
  drudge:
    build:
      context: ./drudge
    image: boring-drudge
    container_name: boring-drudge
    restart: unless-stopped
    # No depends_on — the default wiki mode doesn't need postgres. In vector mode, `--profile vector`
    # brings up postgres alongside, and Store::open's connect retry (~10s) absorbs the startup race.
    environment:
      DRUDGE_LLM_BASE_URL: http://host.docker.internal:11434/v1  # OpenAI-compatible. Swappable for LM Studio, etc.
      DRUDGE_LLM_MODEL: gemma4:12b        # synthesis model (llm.rs sends reasoning_effort:"none" to disable thinking latency)
      DRUDGE_HTTP_ADDR: 0.0.0.0:7700
      PG_DSN: postgresql://boring:boring@postgres:5432/boring
      # Recall sources: CC memory (.claude) + curated vault/wiki (self-augmentation SSOT).
      DRUDGE_SOURCE_DIRS: /host/.claude/projects:/vault/wiki
      DRUDGE_VAULT_DIR: /vault             # target of vault compile (raw→wiki)
      DRUDGE_VECTOR: ${DRUDGE_VECTOR:-off} # default off = wiki-first direct read. on = vector+graph (postgres alongside via --profile vector)
      DRUDGE_COMPANY_SUBSTR: ${DRUDGE_COMPANY_SUBSTR:-} # empty = all personal. set via .env → path substring → origin=company + ingest exclude
      DRUDGE_NOTE_LANG: ${DRUDGE_NOTE_LANG:-} # distill/compile output language: ko | en | empty=auto (follow source)
      DRUDGE_SYNC_HOURS: "4"
      TZ: Asia/Seoul
    volumes:
      - ${HOME}/.claude:/host/.claude:ro  # CC auto-memory source
      - ./vault:/vault                    # self-augmentation vault (raw→compile→wiki)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:7700:7700"             # for host debugging / direct curl

  # ─────────────────────────── Hermes Agent (the brain) ─────────────────────────
  # Nous Hermes Agent — autonomous agent. Persists config/memory in the ~/.hermes volume → the container is disposable.
  # Mac: their compose's network_mode:host isn't supported by Mac Docker → bridge + host.docker.internal.
  # drudge (our RAG) is connected as the agent's MCP memory backend (same stack, sidecar).
  # Default core — the agent is the brain that *drives* ingestion. But the image isn't in the repo (external build) + depends on ~/.hermes:
  # start.sh checks for the image first and, if absent, prints build guidance and stops (instead of a cryptic compose failure).
  hermes-agent:
    image: hermes-agent                   # requires external build (not in repo, Nous Hermes Agent)
    container_name: boring-agent
    restart: unless-stopped
    environment:
      HERMES_UID: ${HERMES_UID:-501}      # host user uid (~/.hermes file permissions)
      HERMES_GID: ${HERMES_GID:-20}
      TZ: Asia/Seoul
    volumes:
      - ${HOME}/.hermes:/opt/data         # persists config / credentials / session memory (autonomy-augmentation layer)
      - ${HOME}/.claude:/host/.claude:ro  # write front door (DISTILL_VIA_AGENT): for reading session transcripts
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Mac: reach host Ollama (gemma4)
    command: ["gateway", "run"]
