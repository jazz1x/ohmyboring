# ohmyboring — live stack (local Docker). host Ollama + ohmyboring engine + hermes-agent (+ Postgres via --profile vector).
#   make up              # wiki-first: ohmyboring engine + hermes-agent
#   DRUDGE_VECTOR=on …   # also brings up Postgres (pgvector) via --profile vector
#   Slack, autonomy, and recall are driven by hermes-agent (Nous Hermes Agent). Models run on host Ollama (gemma4).
# Compose project name = the working/install dir (oh-my-boring), NOT the ohmyboring brand.
# Renaming this orphans an already-running stack: container_name is the fixed boring-*, so a
# project rename makes compose try to recreate boring-drudge/agent/postgres and collide.
name: oh-my-boring

services:
  # ─────────────────────────── Postgres + pgvector (graph = node/edge + CTE) ─────
  # Vector (HNSW) + FTS + graph (node/edge tables, recursive CTE). Pure pgvector, no AGE.
  # Opt-in: wiki-first is the default, so pgvector comes up only with `--profile vector` (to try graph+vector).
  boring-postgres:
    profiles: ["vector"]
    image: pgvector/pgvector:pg16
    container_name: boring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: boring
      POSTGRES_PASSWORD: boring
      POSTGRES_DB: boring
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data   # persistent (survives container teardown)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boring -d boring"]
      interval: 3s
      timeout: 3s
      retries: 30
    ports:
      - "127.0.0.1:5432:5432"             # for DataGrip / direct connection

  # ─────────────────────────── ohmyboring (Rust engine) ─────────────────────────
  # Deterministic kernel: embed + ingest, recall (ask/graph), audit, and the remember MCP tool over HTTP + cron.
  boring-drudge:
    build:
      context: ./drudge
    image: boring-drudge
    container_name: boring-drudge
    restart: unless-stopped
    # Run with an explicit uid:gid so native-Linux bind mounts (host-owned vault) aren't EACCES.
    # Default 10001 = the Dockerfile's drudge uid → macOS (Docker Desktop uid-remaps) is unaffected.
    # Native Linux: set DRUDGE_UID/DRUDGE_GID in .env to your host user (id -u / id -g).
    user: "${DRUDGE_UID:-10001}:${DRUDGE_GID:-10001}"
    # No depends_on — the default wiki mode doesn't need postgres. In vector mode, `--profile vector`
    # brings up postgres alongside, and Store::open's connect retry (~10s) absorbs the startup race.
    environment:
      # LLM connection is the `llm` block of the bind-mounted boring.json (the SSOT). These are
      # pass-through OVERRIDES only — no baked default, so an unset value stays empty and the engine
      # reads boring.json. (A hardcoded default here would shadow boring.json, breaking e.g. an
      # LM Studio base_url set in the config.) OMB_LLM_* is canonical; DRUDGE_LLM_* the deprecated
      # alias. Both forwarded so either .env style works; the engine prefers OMB_. embed_model is the
      # engine's policy SSOT (boring.json only) — no env knob.
      OMB_LLM_BASE_URL: ${OMB_LLM_BASE_URL:-}
      DRUDGE_LLM_BASE_URL: ${DRUDGE_LLM_BASE_URL:-}
      OMB_LLM_MODEL: ${OMB_LLM_MODEL:-}
      DRUDGE_LLM_MODEL: ${DRUDGE_LLM_MODEL:-}
      OMB_LLM_API_KEY: ${OMB_LLM_API_KEY:-}
      DRUDGE_LLM_API_KEY: ${DRUDGE_LLM_API_KEY:-}
      OMB_HTTP_ADDR: 0.0.0.0:7700
      PG_DSN: postgresql://boring:boring@boring-postgres:5432/boring  # host = the boring-postgres service (compose DNS)
      BORING_CONFIG: /app/boring.json     # policy: note language, repo rules, source dirs
      OMB_VAULT_DIR: /vault                # remember target + sync corpus (/vault/wiki)
      # OMB_VECTOR canonical; DRUDGE_VECTOR deprecated alias (both forwarded, engine prefers OMB_).
      OMB_VECTOR: ${OMB_VECTOR:-}
      DRUDGE_VECTOR: ${DRUDGE_VECTOR:-off} # default off = wiki-first direct read. on = vector+graph (boring-postgres alongside via --profile vector)
      OMB_SYNC_HOURS: "4"
      TZ: Asia/Seoul
    volumes:
      - ${HOME}/.claude/projects:/host/.claude/projects:ro  # CC session transcripts (narrowed: drudge's source_dirs only reads ~/.claude/projects)
      - ./vault:/vault                    # self-augmentation vault (agent → remember → wiki)
      - ./boring.json:/app/boring.json:rw # policy config (language, repo rules, source dirs) — rw so the agent's classify_repo can persist rules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:7700:7700"             # for host debugging / direct curl

  # ─────────────────────────── Hermes Agent (the brain) ─────────────────────────
  # Nous Hermes Agent — optional autonomous supervisor. Persists config/memory in the ~/.hermes volume → the container is disposable.
  # Mac: their compose's network_mode:host isn't supported by Mac Docker → bridge + host.docker.internal.
  # ohmyboring (our RAG) is connected as the agent's MCP memory backend (same stack, sidecar).
  # Optional — the agent can drive advanced orchestration, Slack, and cron-based backfill. The image isn't
  # in the repo (external build) + depends on ~/.hermes: start.sh checks for the image and skips the agent
  # if absent, so the core loop works without it.
  boring-agent:
    image: hermes-agent                   # requires external build (not in repo, Nous Hermes Agent)
    container_name: boring-agent
    restart: unless-stopped
    environment:
      HERMES_UID: ${HERMES_UID:-501}      # host user uid (~/.hermes file permissions)
      HERMES_GID: ${HERMES_GID:-20}
      TZ: Asia/Seoul
      # RAG endpoint for morning-briefing (briefing.py) + ingest-worker. OMB_URL canonical, DRUDGE_URL alias.
      OMB_URL: http://boring-drudge:7700
      DRUDGE_URL: http://boring-drudge:7700
    volumes:
      - ${HOME}/.hermes:/opt/data         # persists config / credentials / session memory (autonomy-augmentation layer)
      - ${HOME}/.claude/projects:/host/.claude/projects:ro  # CC session transcripts (narrowed: ingest-worker.py only globs /host/.claude/projects)
      - ${HOME}/.cache/boring-distill:/host/.cache/boring-distill  # shared SessionEnd hook markers (visible to host and container)
      - ./vault:/vault:ro                   # read-only vault so ingest-worker can verify session-id markers in wiki notes
      - ./boring.json:/host/boring.json:ro  # policy config for ingest-worker.py (note_lang, repo rules)
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Mac: reach host Ollama (gemma4)
    command: ["gateway", "run"]
