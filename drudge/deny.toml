# cargo-deny — 공급망 게이트 (취약점·라이선스·중복버전). CI security 잡 + 로컬 `make deny`.
# pip/npm audit 의 Rust 등가. gitleaks(시크릿)와 보완 — 이쪽은 *의존성*의 위험을 본다.

[graph]
all-features = true # 모든 feature 의존 그래프를 봐야 라이선스/취약점 검사가 정직.

[advisories]
# RUSTSEC 권고 DB 기준. yanked crate = deny. 알려진 취약점은 기본 deny.
yanked = "deny"

[bans]
multiple-versions = "warn" # 같은 crate 다중 버전 = 경고(빌드 비대, 강제는 아님).

[licenses]
# drudge 자체는 비공개 개인 바이너리(publish=false) → license 게이트 제외.
private = { ignore = true }
# 허용 라이선스 — 우리 의존 그래프(tokio/axum/reqwest+rustls/serde/pg 등) 커버.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0", # webpki-roots(rustls 의 Mozilla CA 번들) — reqwest rustls-tls 경유.
]
